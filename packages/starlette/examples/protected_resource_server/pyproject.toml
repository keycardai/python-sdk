[project]
name = "protected-resource-server"
version = "0.1.0"
description = "FastAPI protected resource server using keycardai-starlette with @requires and @auth.grant"
requires-python = ">=3.10"
dependencies = [
    "keycardai-starlette",
    "fastapi>=0.116.0",
    "uvicorn>=0.30.0",
    "httpx>=0.27.2",
    "python-dotenv>=1.0.0",
]

[tool.uv.sources]
keycardai-starlette = { path = "../../", editable = true }

[project.scripts]
protected-resource-server = "main:main"

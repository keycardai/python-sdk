[project]
name = "hello-world-server"
version = "0.1.0"
description = "A minimal FastMCP server with Keycard authentication"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "keycardai-fastmcp",
    "fastmcp>=3.0.0",
]

[tool.uv.sources]
keycardai-fastmcp = { workspace = true }

[project.scripts]
hello-world-server = "main:main"

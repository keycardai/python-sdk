[project]
name = "a2a-jsonrpc-usage"
version = "0.1.0"
description = "Example: Calling agent services via the A2A JSONRPC protocol"
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "keycardai-agents",
    "httpx>=0.27.2",
]

[tool.uv.sources]
keycardai-agents = { path = "../../", editable = true }

[project.scripts]
a2a-jsonrpc-usage = "main:run"

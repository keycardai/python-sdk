name: Bump Package Version

on:
  workflow_call:
    inputs:
      package_name:
        required: true
        type: string
        description: "Name of the package to bump (e.g., keycardai-oauth)"
      package_dir:
        required: true
        type: string
        description: "Directory of the package (e.g., packages/oauth)"

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    environment: pypi-release
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate GitHub App token
        id: generate-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.GH_REPO_ACCESS_APP_ID }}
          private-key: ${{ secrets.GH_REPO_ACCESS_PRIVATE_KEY }}

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ steps.generate-token.outputs.token }}
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install commitizen
        run: uv tool install commitizen

      - name: Bump version for ${{ inputs.package_name }}
        env:
          GH_TOKEN: ${{ steps.generate-token.outputs.token }}
        run: |
          uv run python scripts/bump_package.py "${{ inputs.package_name }}" "${{ inputs.package_dir }}"
